<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요소객체 속성 조작</title>
    <script>
        let img1;
        window.onload = function(){
            img1 = document.getElementById("img1");

            // img1.src = "https://placehold.co/300x200";
            img1.src = "imgs/flower.jpg";
            img1.width = 300;
            img1.height = 200;
        }

        function changeImage(btn){
            if(btn.innerText === "동물이미지변경"){
                img1.src = "imgs/dog.jpg";
                btn.innerText = "꽃이미지변경";
            } else {
                img1.src = "imgs/flower.jpg";
                btn.innerText = "동물이미지변경";
            }

        }
    </script>
</head>
<body>
    <button onclick="changeImage(this)">동물이미지 변경</button>
    <br><br>
    <img id="img1">
</body>
</html>
